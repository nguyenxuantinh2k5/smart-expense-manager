<script src="https://cdn.tailwindcss.com"></script>
<body class="bg-slate-50">
    <div class="min-h-screen flex items-center justify-center py-12 px-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
            <h1 class="text-2xl font-bold text-slate-800 mb-6 text-center">✏️ Sửa Thông Tin Cá Nhân</h1>
            
            {% if success %}
                <div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded-lg mb-4">
                    {{ success }}
                </div>
            {% endif %}
            
            {% if error %}
                <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg mb-4">
                    {{ error }}
                </div>
            {% endif %}
            
            <form method="POST" class="space-y-4">
                {% csrf_token %}
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Tên đăng nhập (không thể đổi)</label>
                    <input type="text" value="{{ user.username }}" disabled class="w-full p-3 border rounded-lg bg-gray-100">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                    <input type="email" name="email" value="{{ user.email }}" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500" required>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Tên (First Name)</label>
                    <input type="text" name="first_name" value="{{ user.first_name }}" placeholder="Ví dụ: Văn" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Họ (Last Name)</label>
                    <input type="text" name="last_name" value="{{ user.last_name }}" placeholder="Ví dụ: Nguyễn" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500">
                </div>
                
                <div class="flex gap-3 pt-4">
                    <button type="submit" class="flex-1 bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition">💾 Lưu</button>
                    <a href="{% url 'user_profile' %}" class="flex-1 bg-gray-400 text-white py-3 rounded-lg font-semibold hover:bg-gray-500 text-center transition">✖ Hủy</a>
                </div>
            </form>
        </div>
    </div>
</body>
