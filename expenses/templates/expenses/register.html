<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Đăng ký - AI Expense</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <h2 class="text-2xl font-bold mb-6 text-center text-slate-800">Tạo tài khoản mới ✨</h2>
        <form method="POST">
            {% csrf_token %}
            <div class="space-y-4">
                {% for field in form %}
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>
                        {% endif %}
                    </div>
                {% endfor %}
            </div>
            <button class="w-full mt-8 bg-emerald-600 text-white py-3 rounded-xl font-semibold hover:bg-emerald-700 transition">Đăng ký ngay</button>
        </form>
        <p class="mt-6 text-center text-sm text-slate-500">
            Đã có tài khoản? <a href="{% url 'login' %}" class="text-emerald-600 font-bold hover:underline">Đăng nhập tại đây</a>
        </p>
    </div>
    <style>
        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
            outline: none;
        }
        input:focus {
            border-color: #10b981;
            ring: 2px;
            ring-color: #10b981;
        }
    </style>
</body>
</html>
