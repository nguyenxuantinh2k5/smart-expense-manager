<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - AI Expense</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <h2 class="text-2xl font-bold mb-6 text-center text-slate-800">Chào mừng trở lại! 🔐</h2>
        <form method="POST">
            {% csrf_token %}
            <div class="space-y-4">
                {% for field in form %}
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">{{ field.label }}</label>
                        {{ field }}
                    </div>
                {% endfor %}
            </div>
            <button class="w-full mt-8 bg-blue-600 text-white py-3 rounded-xl font-semibold hover:bg-blue-700 transition">Đăng nhập</button>
        </form>
        <p class="mt-6 text-center text-sm text-slate-500">
            Chưa có tài khoản? <a href="{% url 'register' %}" class="text-blue-600 font-bold hover:underline">Đăng ký miễn phí</a>
        </p>
    </div>
    <style>
        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
            outline: none;
        }
        input:focus {
            border-color: #3b82f6;
        }
    </style>
</body>
</html>
