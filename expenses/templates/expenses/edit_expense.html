<script src="https://cdn.tailwindcss.com"></script>
<body class="bg-slate-50">
    <div class="min-h-screen flex items-center justify-center py-12 px-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
            <h1 class="text-2xl font-bold text-slate-800 mb-6 text-center">✏️ Sửa Chi Tiêu</h1>
            
            {% if error %}
                <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg mb-4">
                    {{ error }}
                </div>
            {% endif %}
            
            <form method="POST" class="space-y-4">
                {% csrf_token %}
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Số tiền (VNĐ)</label>
                    <input type="number" name="amount" step="0.01" value="{{ transaction.amount }}" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" required>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Danh mục</label>
                    <select name="category" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        {% for cat in categories %}
                            <option value="{{ cat.name }}" {% if transaction.category.name == cat.name %}selected{% endif %}>
                                {{ cat.name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Ghi chú</label>
                    <textarea name="note" rows="3" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">{{ transaction.note }}</textarea>
                </div>
                
                <div class="flex gap-3 pt-4">
                    <button type="submit" class="flex-1 bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition">Lưu</button>
                    <a href="{% url 'dashboard' %}" class="flex-1 bg-gray-400 text-white py-3 rounded-lg font-semibold hover:bg-gray-500 text-center transition">Hủy</a>
                </div>
            </form>
            
            <div class="mt-4 text-xs text-gray-500 text-center">
                Ngày tạo: {{ transaction.created_at|date:"d/m/Y H:i" }}
            </div>
        </div>
    </div>
</body>
