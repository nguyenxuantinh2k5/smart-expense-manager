<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Thêm chi tiêu - AI Expense</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <h1 class="text-2xl font-bold text-slate-800 mb-6 text-center">🤖 Nhập chi tiêu AI</h1>
        {% if error %}
            <div class="mb-6 p-4 bg-red-100 border border-red-400 rounded-lg">
                <p class="text-red-700 font-medium">{{ error }}</p>
            </div>
        {% endif %}
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Cách 1: Nhập văn bản</label>
                <textarea name="raw_text" rows="2" class="w-full p-3 border rounded-xl" placeholder="Ăn sáng 30k..."></textarea>
            </div>
            <div class="relative flex py-4 items-center">
                <div class="flex-grow border-t border-gray-300"></div>
                <span class="flex-shrink mx-4 text-gray-400 text-sm">HOẶC</span>
                <div class="flex-grow border-t border-gray-300"></div>
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Cách 2: Tải ảnh hóa đơn</label>
                <input type="file" name="image_file" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"/>
                <p class="text-xs text-gray-500 mt-2">Tối đa 5MB, định dạng: JPG, PNG, WebP</p>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold hover:bg-blue-700">Xử lý ngay</button>
        </form>
        <div class="mt-6 p-4 bg-blue-50 rounded-lg border border-blue-200">
            <p class="text-sm text-blue-800">
                <strong>Mẹo:</strong> Nhập chi tiêu một cách tự nhiên, AI sẽ tự động phân loại!
            </p>
        </div>
    </div>
</body>
