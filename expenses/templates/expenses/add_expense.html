<script src="https://cdn.tailwindcss.com"></script>
<body class="bg-slate-50 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <h1 class="text-2xl font-bold text-slate-800 mb-6 text-center">🤖 AI Expense Tracker</h1>
        <form method="POST">
            {% csrf_token %}
            <textarea name="raw_text" rows="3" class="w-full p-4 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Ví dụ: Ăn phở 45k..."></textarea>
            <button class="w-full mt-4 bg-blue-600 text-white py-3 rounded-xl font-semibold hover:bg-blue-700 transition">Phân tích & Lưu</button>
        </form>
    </div>
</body>
